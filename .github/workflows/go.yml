name: Go

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: '1.25.x'

    - name: Build
      run: make build

    - name: Check Formatting (Rule 26)
      run: |
        make fmt
        if [ -n "$(git status --porcelain)" ]; then
          echo "Code is not formatted. Please run 'make fmt' locally."
          git diff
          exit 1
        fi

    - name: Check Vendoring Parity (Rule 25)
      run: |
        make vendor
        if [ -n "$(git status --porcelain vendor/)" ]; then
          echo "Vendor directory is out of sync. Please run 'go work vendor' locally."
          git status --porcelain vendor/
          exit 1
        fi

    - name: Test
      run: make test

    - name: Benchmark
      run: make benchmark

    - name: E2E Integration Tests
      run: make test-e2e

    - name: Coverage
      run: make coverage

    - name: Upload Coverage
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: coverage.out
