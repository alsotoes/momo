name: Scale & CAS E2E Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  scale-cas-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25.x'
          
      - name: Run Scale & CAS E2E Test
        run: |
          chmod +x .github/scripts/test-scale-cas.sh
          ./.github/scripts/test-scale-cas.sh
