name: Update README with Benchmarks

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    - name: Run Benchmark on Current Commit
      run: |
        make benchmark COUNT=5 | tee current_bench.txt

    - name: Run Benchmark on Previous Commit
      run: |
        git checkout HEAD^1
        make benchmark COUNT=5 | tee base_bench.txt
        git checkout -

    - name: Update README
      run: |
        ./.github/scripts/update_readme_with_benchmarks.sh base_bench.txt current_bench.txt $(git rev-parse HEAD)

    - name: Commit and push if changed
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add doc/README.md .github/data/benchmark_history.csv
        if git diff --staged --quiet; then
          echo "No changes to commit."
        else
          git commit -m "docs: update benchmark results in README"
          git push
        fi
