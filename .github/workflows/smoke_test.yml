name: Smoke Test

on:
  push:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  smoke-test-tcp:
    name: Smoke Test (TCP)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
    - name: Build momo
      run: make build
    - name: Run TCP Smoke Test
      run: make smoke-tcp

  smoke-test-quic:
    name: Smoke Test (QUIC)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
    - name: Build momo
      run: make build
    - name: Run QUIC Smoke Test
      run: make smoke-quic

  smoke-test-s3-tcp:
    name: Smoke Test (S3-TCP)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
    - name: Build momo
      run: make build
    - name: Run S3-TCP Smoke Test
      run: make smoke-s3-tcp

  smoke-test-s3-quic:
    name: Smoke Test (S3-QUIC)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'
    - name: Build momo
      run: make build
    - name: Run S3-QUIC Smoke Test
      run: make smoke-s3-quic

