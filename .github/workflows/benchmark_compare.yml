name: Performance Comparison

on:
  pull_request:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  push:
    branches: [ "master" ]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  benchstat:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24.x'

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    - name: Run Benchmark on Current Commit
      run: |
        make benchmark COUNT=5 | tee current_bench.txt

    - name: Run Benchmark on Base Branch (PR)
      if: github.event_name == 'pull_request'
      run: |
        git checkout ${{ github.event.pull_request.base.sha }}
        make benchmark COUNT=5 | tee base_bench.txt
        git checkout -

    - name: Run Benchmark on Previous Commit (Push)
      if: github.event_name == 'push'
      run: |
        git checkout HEAD^1
        make benchmark COUNT=5 | tee base_bench.txt
        git checkout -

    - name: Compare Benchmarks and Enforce Threshold
      run: |
        echo "## Performance Comparison (Benchstat)" >> $GITHUB_STEP_SUMMARY
        echo '```text' >> $GITHUB_STEP_SUMMARY
        benchstat base_bench.txt current_bench.txt | tee bench_comparison.txt
        cat bench_comparison.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        
        # Check if there is any statistically significant degradation greater than 5%.
        # GitHub Actions runners have inherent noise, so we tolerate up to 5% variance.
        if awk '/\+[0-9]+\.[0-9]+%/ {
            match($0, /\+([0-9]+\.[0-9]+)%/, arr)
            if (arr[1] + 0 > 5.0) {
                print "❌ Performance degradation > 5% detected: +" arr[1] "%"
                exit 1
            }
        }' bench_comparison.txt; then
          echo "✅ No significant performance degradation (> 5%) detected." >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Performance degradation > 5% detected! Failing the pipeline." >> $GITHUB_STEP_SUMMARY
          exit 1
        fi
