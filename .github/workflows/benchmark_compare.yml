name: Performance Comparison

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  benchstat:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install benchstat
      run: go install golang.org/x/perf/cmd/benchstat@latest

    - name: Run Benchmark on Current Commit
      run: |
        make benchmark COUNT=5 | tee current_bench.txt

    - name: Run Benchmark on Base Branch (PR)
      if: github.event_name == 'pull_request'
      run: |
        git checkout ${{ github.event.pull_request.base.sha }}
        make benchmark COUNT=5 | tee base_bench.txt
        git checkout -

    - name: Run Benchmark on Previous Commit (Push)
      if: github.event_name == 'push'
      run: |
        git checkout HEAD^1
        make benchmark COUNT=5 | tee base_bench.txt
        git checkout -

    - name: Compare Benchmarks and Enforce Threshold
      run: |
        echo "## Performance Comparison (Benchstat)" >> $GITHUB_STEP_SUMMARY
        echo '```text' >> $GITHUB_STEP_SUMMARY
        benchstat base_bench.txt current_bench.txt | tee bench_comparison.txt
        cat bench_comparison.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        
        # Check if there is any statistically significant degradation.
        # benchstat outputs "+" for increases in time/op or alloc/op (which is bad).
        # We ignore exactly "+0.00%" which can happen with geomeans.
        if grep -E "\+[0-9]+\.[0-9]+%" bench_comparison.txt | grep -v "+0.00%"; then
          echo "❌ Performance degradation detected! Failing the pipeline." >> $GITHUB_STEP_SUMMARY
          exit 1
        else
          echo "✅ No statistically significant performance degradation detected." >> $GITHUB_STEP_SUMMARY
        fi
