name: P2P Gossip E2E Test

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  p2p-gossip-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25.x'
          
      - name: Run P2P Gossip E2E Test
        run: |
          chmod +x .github/scripts/test-e2e-p2p.sh
          ./.github/scripts/test-e2e-p2p.sh
