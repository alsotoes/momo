name: Gemini AI Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git diff

      - name: Run AI Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Fetch origin/master for comparison
          git fetch origin master

          # Run the reviewer script and capture output
          REVIEW_OUTPUT=$(python3 .github/scripts/ai_reviewer.py)

          # If output is not empty and not just "No relevant changes...", post it as a formal review
          if [[ -n "$REVIEW_OUTPUT" && "$REVIEW_OUTPUT" != "No relevant changes to review." ]]; then
            echo "$REVIEW_OUTPUT" > review_comment.txt
            
            gh pr review ${{ github.event.pull_request.number }} --comment --body-file review_comment.txt
          fi

