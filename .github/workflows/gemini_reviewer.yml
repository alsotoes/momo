name: Gemini AI Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review (manual trigger)'
        required: true
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Needed for git diff

      - name: Run AI Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # PAT (if defined) is used for issue/PR management (tracking issues, labels, assignees, merge)
          # so Jules self-healing continues to work under @alsotoes.
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          # The workflow's own GITHUB_TOKEN posts the review so it appears under @github-actions[bot],
          # making the bot the reviewer on every PR (as intended before the PAT change).
          BOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # For workflow_dispatch, fetch PR metadata not available from the event payload
          if [[ -z "$PR_BRANCH" && -n "$PR_NUMBER" ]]; then
            gh pr view "$PR_NUMBER" --json headRefName,author,body,title > /tmp/pr.json
            export PR_BRANCH=$(jq -r .headRefName /tmp/pr.json)
            export PR_AUTHOR=$(jq -r .author.login /tmp/pr.json)
            export PR_BODY=$(jq -r .body /tmp/pr.json)
            export PR_TITLE=$(jq -r .title /tmp/pr.json)
            git fetch origin "$PR_BRANCH"
            git checkout "$PR_BRANCH"
          fi

          # Fetch origin/master for comparison
          git fetch origin master

          # Run the reviewer script and capture output
          REVIEW_OUTPUT=$(python3 .github/scripts/ai_reviewer.py)

          # If output is not empty and not just "No relevant changes...", post it as a formal review
          if [[ -n "$REVIEW_OUTPUT" && "$REVIEW_OUTPUT" != "No relevant changes to review." ]]; then
            echo "$REVIEW_OUTPUT" > review_comment.txt

            # Post the review as @github-actions[bot] (using the workflow GITHUB_TOKEN)
            GH_TOKEN="$BOT_TOKEN" gh pr review "$PR_NUMBER" --comment --body-file review_comment.txt
          fi
