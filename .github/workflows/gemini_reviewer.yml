name: Gemini AI Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'src/**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        required: true
        type: string

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Needed for git diff

      - name: Run AI Reviewer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          # Use PERSONAL_ACCESS_TOKEN (PAT) for issue/PR management (Jules self-healing)
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          # Use BOT_TOKEN (secrets.GITHUB_TOKEN) to post reviews as github-actions[bot]
          BOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DISPATCH_PR_NUMBER: ${{ github.event.inputs.pr_number }}
        run: |
          # Use workflow_dispatch PR number if PR_NUMBER is empty (workflow_dispatch trigger)
          if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
            PR_NUMBER="$DISPATCH_PR_NUMBER"
            # Fetch PR metadata for workflow_dispatch
            PR_AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
            PR_TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
            export PR_AUTHOR PR_TITLE PR_BODY PR_NUMBER
          fi
          echo "Reviewing PR #$PR_NUMBER"

          # Fetch origin/master for comparison
          git fetch origin master

          # Run the reviewer script and capture output
          REVIEW_OUTPUT=$(python3 .github/scripts/ai_reviewer.py)

          # If output is not empty and not just "No relevant changes...", post it as a formal review
          if [[ -n "$REVIEW_OUTPUT" && "$REVIEW_OUTPUT" != "No relevant changes to review." ]]; then
            echo "$REVIEW_OUTPUT" > review_comment.txt

            # Post review as github-actions[bot] using BOT_TOKEN
            GH_TOKEN="$BOT_TOKEN" gh pr review "$PR_NUMBER" --comment --body-file review_comment.txt
          fi
